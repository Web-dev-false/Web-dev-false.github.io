<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectucuc | Principal</title>
    <link rel="shortcut icon" href="imgs/favicon.png">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

    <header class="top-bar">
        <div class="logo">
            <a href="https://cuc.uncuyo.edu.ar">
                <img src="imgs/luka.png" alt="Logo">
            </a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero__glow" aria-hidden="true"></div>
            <div class="hero__content">
                <p class="hero__eyebrow">Lectucuc!</p>
                <h1 class="hero__title">Los viernes,<br>nos juntamos<br>en la biblioteca.</h1>
                <p class="hero__subtitle">
                    Somos un grupo de estudiantes que pasan el rato a su manera...
                </p>
                <div class="hero__actions">
                    <a href="sumate.html" class="btn btn--primary">Sumate!</a>
                    <a href="news.html" class="btn btn--primary">Noticias</a>
                </div>
            </div>
            <div class="hero__visual" aria-hidden="true">
                <span>Espacio para una foto del lectucuc.</span>
            </div>
        </section>

    </main>

</body>
</html>
